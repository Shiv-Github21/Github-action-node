name: node-linter
on:
  push:
    paths:
      - "**/*.js"

jobs:
  code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci
      #- run: npm run build --if-present
      
      - name: Run Linter
        run: npm run lint

      - name: Docker-set
        uses: docker/login-action@v4
        with:
         username: ${{vars.DOCKER_USERNAME}}
         password: ${{secrets.DOCKER_PASSWORD}}

      - name: build & push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{vars.DOCKERHUB_USERNAME}}/simple-node-fe-main
      
